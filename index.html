<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AIミニアプリ構築講座 | Eラーニング</title>
<script src="urls.js"></script>
<script src="content.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap');
  :root{--green:#0f7a5a;--green-light:#e8f5f0;--green-mid:#1D9E75;--dark:#1a1f2e;--sidebar-w:240px;--header-h:52px;}
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'Noto Sans JP',sans-serif;background:#f4f6f8;color:#222;height:100vh;display:flex;flex-direction:column;overflow:hidden;}

  /* ── パスワード画面 ── */
  #loginScreen{position:fixed;inset:0;background:linear-gradient(135deg,#0f7a5a,#1a1f2e);display:flex;align-items:center;justify-content:center;z-index:999;}
  #loginScreen.hidden{display:none;}
  .login-box{background:#fff;border-radius:16px;padding:40px 36px;width:340px;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,.3);}
  .login-logo{font-size:36px;margin-bottom:12px;}
  .login-title{font-size:18px;font-weight:700;color:var(--dark);margin-bottom:4px;}
  .login-sub{font-size:12px;color:#64748b;margin-bottom:24px;}
  .login-input{width:100%;padding:12px 16px;border:2px solid #e2e8f0;border-radius:8px;font-size:16px;font-family:inherit;text-align:center;letter-spacing:.3em;margin-bottom:12px;transition:border .2s;}
  .login-input:focus{outline:none;border-color:var(--green-mid);}
  .login-btn{width:100%;background:var(--green-mid);color:#fff;border:none;border-radius:8px;padding:12px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;transition:background .2s;}
  .login-btn:hover{background:var(--green);}
  .login-error{font-size:12px;color:#dc2626;margin-top:8px;height:18px;}
  .login-hint{font-size:11px;color:#94a3b8;margin-top:16px;}

  header{height:var(--header-h);background:var(--dark);display:flex;align-items:center;padding:0 20px;gap:14px;flex-shrink:0;z-index:10;}
  .logo-badge{background:var(--green-mid);color:#fff;font-size:10px;font-weight:700;padding:3px 8px;border-radius:4px;}
  .logo-text{color:#fff;font-size:15px;font-weight:700;}
  .logo-sub{color:#8899aa;font-size:12px;margin-left:6px;}
  .header-right{margin-left:auto;display:flex;align-items:center;gap:12px;}
  .pbar-outer{width:120px;height:6px;background:#2d3748;border-radius:3px;}
  .pbar-fill{height:100%;background:var(--green-mid);border-radius:3px;transition:width .4s;}
  .prog-text{color:#8899aa;font-size:12px;}
  .gallery-link{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);color:#fff;font-size:11px;padding:5px 12px;border-radius:5px;cursor:pointer;font-family:inherit;text-decoration:none;}
  .gallery-link:hover{background:rgba(255,255,255,.2);}
  .user-icon{width:32px;height:32px;border-radius:50%;background:var(--green-mid);display:flex;align-items:center;justify-content:center;color:#fff;font-size:13px;font-weight:700;}
  .edit-toggle-btn{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);color:#fff;font-size:11px;padding:5px 12px;border-radius:5px;cursor:pointer;font-family:inherit;}
  .edit-toggle-btn.on{background:#f59e0b;border-color:#f59e0b;color:#1a1f2e;font-weight:700;}

  .body-wrap{display:flex;flex:1;overflow:hidden;}

  aside{width:var(--sidebar-w);background:#fff;border-right:1px solid #e2e8f0;display:flex;flex-direction:column;overflow:hidden;flex-shrink:0;}
  .aside-head{padding:14px 16px 10px;border-bottom:1px solid #e2e8f0;}
  .aside-head h2{font-size:12px;color:#64748b;font-weight:500;}
  .lesson-list{overflow-y:auto;flex:1;}
  .lesson-list::-webkit-scrollbar{width:4px;}
  .lesson-list::-webkit-scrollbar-thumb{background:#cbd5e1;border-radius:2px;}
  .lesson-item{display:flex;align-items:flex-start;gap:10px;padding:12px 16px;cursor:pointer;border-bottom:1px solid #f1f5f9;transition:background .15s;}
  .lesson-item:hover{background:#f8fafc;}
  .lesson-item.active{background:var(--green-light);border-left:3px solid var(--green-mid);padding-left:13px;}
  .lnum{font-size:10px;font-weight:700;color:#94a3b8;padding-top:2px;min-width:28px;}
  .lesson-item.active .lnum{color:var(--green);}
  .linfo{flex:1;min-width:0;}
  .lname{font-size:12px;font-weight:500;color:#1e293b;line-height:1.4;}
  .lesson-item.active .lname{color:var(--green);}
  .lmeta{display:flex;align-items:center;gap:6px;margin-top:4px;}
  .ltime{font-size:11px;color:#94a3b8;}
  .done-tag{font-size:10px;background:#dcfce7;color:#16a34a;padding:1px 6px;border-radius:10px;font-weight:500;}
  .lcheck{width:18px;height:18px;border-radius:50%;border:1.5px solid #cbd5e1;flex-shrink:0;margin-top:2px;display:flex;align-items:center;justify-content:center;font-size:10px;}
  .lcheck.done{background:var(--green-mid);border-color:var(--green-mid);color:#fff;}

  main{flex:1;display:flex;flex-direction:column;overflow:hidden;}

  .video-selector{display:flex;background:#111827;border-bottom:1px solid #1f2937;flex-shrink:0;}
  .vsel-btn{flex:1;padding:8px 4px;font-size:11px;font-weight:500;color:#6b7280;background:none;border:none;border-bottom:2px solid transparent;cursor:pointer;font-family:inherit;line-height:1.4;}
  .vsel-btn:hover{color:#d1d5db;}
  .vsel-btn.active{color:#1D9E75;border-bottom-color:#1D9E75;background:rgba(29,158,117,.08);}
  .vsel-btn .vsel-sub{display:block;font-size:9px;color:#4b5563;}
  .vsel-btn.active .vsel-sub{color:#9FE1CB;}

  .url-edit-row{display:none;align-items:center;gap:8px;padding:5px 12px;background:#f8fafc;border-bottom:1px solid #e2e8f0;flex-shrink:0;}
  .edit-mode-active .url-edit-row{display:flex;}
  .url-edit-row label{font-size:11px;color:#64748b;white-space:nowrap;}
  .url-edit-row input{flex:1;font-size:11px;padding:3px 7px;border:1px solid #cbd5e1;border-radius:4px;font-family:inherit;}
  .url-apply-btn{font-size:11px;background:var(--green-mid);color:#fff;border:none;border-radius:4px;padding:3px 10px;cursor:pointer;font-family:inherit;}

  .video-wrap{flex:1;background:#0d1117;display:flex;flex-direction:column;min-height:0;}
  .video-topbar{display:flex;align-items:center;padding:8px 16px;background:rgba(0,0,0,.6);gap:10px;}
  .vid-badge{font-size:11px;color:var(--green-mid);font-weight:700;}
  .vid-title{font-size:13px;color:#e2e8f0;font-weight:500;flex:1;}
  .vid-time{font-size:11px;color:#64748b;}
  .vid-type{font-size:10px;color:#4b5563;background:#1f2937;padding:2px 7px;border-radius:10px;}
  .video-player{flex:1;position:relative;min-height:0;}
  .video-player iframe{width:100%;height:100%;border:none;display:block;}
  .video-placeholder{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;background:#0d1117;}
  .play-circle{width:64px;height:64px;border-radius:50%;background:rgba(255,255,255,.12);border:2px solid rgba(255,255,255,.3);display:flex;align-items:center;justify-content:center;}
  .play-tri{width:0;height:0;border-top:13px solid transparent;border-bottom:13px solid transparent;border-left:22px solid rgba(255,255,255,.9);margin-left:5px;}
  .ph-title{color:#94a3b8;font-size:12px;text-align:center;line-height:1.7;}
  .video-controls{background:rgba(0,0,0,.75);padding:8px 16px;display:flex;align-items:center;gap:10px;flex-shrink:0;}
  .progress-track{flex:1;height:4px;background:rgba(255,255,255,.15);border-radius:2px;cursor:pointer;}
  .progress-fill{height:100%;background:var(--green-mid);border-radius:2px;transition:width .3s;}
  .vc-time{font-size:11px;color:#94a3b8;white-space:nowrap;min-width:72px;}
  .vc-btn{background:none;border:none;color:#94a3b8;cursor:pointer;font-size:11px;padding:2px 8px;border-radius:4px;font-family:inherit;}
  .vc-btn:hover{color:#fff;}

  .final-banner{display:none;background:linear-gradient(135deg,#0f7a5a,#1D9E75);padding:10px 18px;align-items:center;gap:14px;flex-shrink:0;}
  .final-banner.show{display:flex;}
  .fb-text h3{font-size:12px;font-weight:700;color:#fff;margin-bottom:2px;}
  .fb-text p{font-size:10px;color:#a7f3d0;}
  .fb-btn{background:#f59e0b;color:#1a1f2e;font-size:12px;font-weight:700;border:none;border-radius:6px;padding:7px 16px;cursor:pointer;font-family:inherit;white-space:nowrap;margin-left:auto;}
  .fb-btn:hover{background:#d97706;}

  .bottom-panel{height:240px;background:#fff;border-top:1px solid #e2e8f0;display:flex;flex-direction:column;flex-shrink:0;}
  .tab-bar{display:flex;border-bottom:1px solid #e2e8f0;background:#f8fafc;flex-shrink:0;}
  .tab-btn{padding:9px 14px;font-size:12px;color:#64748b;cursor:pointer;border:none;background:none;border-bottom:2px solid transparent;font-family:inherit;font-weight:500;}
  .tab-btn.active{color:var(--green);border-bottom-color:var(--green-mid);background:#fff;}
  .tab-content{flex:1;overflow-y:auto;padding:12px 16px;}
  .tab-content::-webkit-scrollbar{width:4px;}

  .desc-intro{font-size:13px;color:#374151;line-height:1.75;margin-bottom:10px;}
  .point-grid{display:flex;flex-wrap:wrap;gap:6px;}
  .point-chip{font-size:11px;background:var(--green-light);color:var(--green);padding:4px 10px;border-radius:20px;font-weight:500;}

  .prompt-box{background:#0f172a;border-radius:8px;padding:12px 14px;margin-bottom:10px;}
  .prompt-label{font-size:10px;color:#64748b;margin-bottom:6px;font-weight:500;}
  .prompt-text{font-size:12px;color:#a5b4fc;line-height:1.7;white-space:pre-wrap;}
  .copy-btn{font-size:11px;background:#1e293b;color:#94a3b8;border:1px solid #334155;border-radius:4px;padding:3px 10px;cursor:pointer;font-family:inherit;}
  .copy-btn:hover{background:#334155;color:#fff;}
  .no-prompt-msg{font-size:13px;color:#94a3b8;}

  .ex-title{font-size:13px;font-weight:700;color:#1e293b;margin-bottom:10px;display:flex;align-items:center;gap:6px;}
  .ex-title::before{content:'';display:inline-block;width:4px;height:16px;background:var(--green-mid);border-radius:2px;flex-shrink:0;}
  .ex-item{background:#f0fdf4;border:1px solid #bbf7d0;border-radius:8px;padding:12px 14px;margin-bottom:10px;}
  .ex-num{font-size:10px;font-weight:700;color:var(--green);margin-bottom:5px;}
  .ex-q{font-size:12px;color:#1e293b;line-height:1.75;margin-bottom:8px;white-space:pre-wrap;}
  .ex-hint{font-size:11px;color:#374151;background:#fff;border:1px dashed #cbd5e1;border-radius:6px;padding:8px 12px;line-height:1.7;white-space:pre-wrap;}
  .ex-hint-label{font-size:10px;font-weight:700;color:var(--green);display:block;margin-bottom:4px;}

  .edit-bar{background:#fef9e7;border-bottom:2px solid #f59e0b;padding:6px 16px;display:none;align-items:center;gap:10px;font-size:12px;color:#92400e;flex-shrink:0;}
  .edit-bar.show{display:flex;}
  .save-all-btn{background:#f59e0b;color:#1a1f2e;border:none;border-radius:5px;padding:5px 14px;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;}
  .export-btn{background:#fff;color:#92400e;border:1px solid #f59e0b;border-radius:5px;padding:5px 14px;font-size:12px;cursor:pointer;font-family:inherit;}
</style>
</head>
<body>

<!-- ★ パスワード画面 -->
<div id="loginScreen">
  <div class="login-box">
    <div class="login-logo">🔐</div>
    <div class="login-title">AIミニアプリ構築講座</div>
    <div class="login-sub">eラーニングサイト</div>
    <input type="password" class="login-input" id="pwInput" placeholder="パスワードを入力"
      onkeydown="if(event.key==='Enter')checkPw()">
    <button class="login-btn" onclick="checkPw()">ログイン</button>
    <div class="login-error" id="pwError"></div>
    <div class="login-hint">パスワードは受講案内メールをご確認ください</div>
  </div>
</div>

<header>
  <div class="logo-badge">長崎県補助金対象</div>
  <div class="logo-text">AIミニアプリ構築講座</div>
  <div class="logo-sub">eラーニング</div>
  <div class="header-right">
    <span class="prog-text" id="progText">0 / 7 完了</span>
    <div class="pbar-outer"><div class="pbar-fill" id="globalBar" style="width:0%"></div></div>
    <a href="gallery.html" class="gallery-link">🏆 作品展示</a>
    <button class="edit-toggle-btn" id="editToggleBtn" onclick="toggleEditMode()">✏️ 編集モード</button>
    <div class="user-icon">前</div>
  </div>
</header>

<div class="edit-bar" id="editBar">
  ✏️ 編集モード：YouTube URLを設定できます
  <button class="save-all-btn" onclick="saveProgress()">💾 進捗を保存</button>
  <button class="export-btn" onclick="exportUrls()">📥 URL書き出し</button>
  <span style="margin-left:auto;font-size:11px;color:#a16207;">※URLはurls.jsで管理してください</span>
</div>

<div class="body-wrap">
  <aside>
    <div class="aside-head"><h2>eラーニング 全7動画</h2></div>
    <div class="lesson-list" id="lessonList"></div>
  </aside>

  <main id="mainArea">
    <div class="video-selector">
      <button class="vsel-btn active" id="vsel0" onclick="selectVideoType(0)">
        <span class="vsel-sub" id="vsub0">動画⑤-①</span>概要
      </button>
      <button class="vsel-btn" id="vsel1" onclick="selectVideoType(1)">
        <span class="vsel-sub" id="vsub1">動画⑤-②</span>具体的内容
      </button>
      <button class="vsel-btn" id="vsel2" onclick="selectVideoType(2)">
        <span class="vsel-sub" id="vsub2">動画⑤-③</span>実演
      </button>
    </div>

    <div class="url-edit-row" id="urlEditRow">
      <label id="urlEditLabel">YouTube URL（概要）：</label>
      <input type="text" id="urlInput" placeholder="https://www.youtube.com/watch?v=XXXXXXXXX">
      <button class="url-apply-btn" onclick="applyUrl()">適用</button>
    </div>

    <div class="video-wrap">
      <div class="video-topbar">
        <span class="vid-badge" id="vBadge">動画⑤</span>
        <span class="vid-title" id="vTitle">GEM設定の基本操作</span>
        <span class="vid-time" id="vTime">30分</span>
        <span class="vid-type" id="vTypeLabel">概要</span>
      </div>
      <div class="video-player">
        <div class="video-placeholder" id="vidPlaceholder">
          <div class="play-circle"><div class="play-tri"></div></div>
          <div class="ph-title" id="phTitle">動画を選択してください</div>
        </div>
        <iframe id="videoFrame" style="display:none" allowfullscreen allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"></iframe>
      </div>
      <div class="video-controls">
        <button class="vc-btn" onclick="markDone()">✓ 視聴完了</button>
        <div class="progress-track" onclick="seekProg(event)">
          <div class="progress-fill" id="videoProgress" style="width:0%"></div>
        </div>
        <span class="vc-time" id="vcTime">0:00 / 30:00</span>
        <button class="vc-btn" onclick="nextLesson()">次の動画 →</button>
      </div>
    </div>

    <div class="final-banner" id="finalBanner">
      <div class="fb-text">
        <h3>🎉 全7動画の視聴お疲れさまでした！</h3>
        <p>総合確認テストで理解度を確認しましょう（所要時間：約10分）</p>
      </div>
      <button class="fb-btn" onclick="openFinalTest()">総合確認テストへ →</button>
    </div>

    <div class="bottom-panel">
      <div class="tab-bar">
        <button class="tab-btn active" onclick="showTab('desc',this)">📖 説明・ポイント</button>
        <button class="tab-btn" onclick="showTab('prompt',this)">💡 プロンプト集</button>
        <button class="tab-btn" id="exTabBtn" onclick="showTab('exercise',this)" style="display:none;">🎯 実演練習問題</button>
      </div>
      <div class="tab-content" id="descPanel"></div>
      <div class="tab-content" id="promptPanel" style="display:none"></div>
      <div class="tab-content" id="exercisePanel" style="display:none"></div>
    </div>
  </main>
</div>

<script>
// ============================================================
// パスワード設定（ここを変更する）
// ============================================================
const PASSWORD = "nagasaki2026";  // ← パスワードをここで設定

function checkPw(){
  const val = document.getElementById('pwInput').value;
  if(val === PASSWORD){
    document.getElementById('loginScreen').classList.add('hidden');
    sessionStorage.setItem('loggedIn','1');
  } else {
    document.getElementById('pwError').textContent = 'パスワードが違います';
    document.getElementById('pwInput').value = '';
    setTimeout(()=>document.getElementById('pwError').textContent='', 2000);
  }
}

// セッション中はログイン状態を維持
if(sessionStorage.getItem('loggedIn')==='1'){
  document.getElementById('loginScreen').classList.add('hidden');
}

// ============================================================
// 動画リスト定義（YouTube URLはurls.jsから読み込む）
// 説明・ポイント・プロンプト・練習問題はcontent.jsから読み込む
// ============================================================
const lessons = [
  {num:1,badge:"動画①",name:"AIの現状と2026年トレンド",  time:"30分",hasDemo:false,done:false},
  {num:2,badge:"動画②",name:"プロンプト8原則＋演習",      time:"40分",hasDemo:true, done:false},
  {num:3,badge:"動画③",name:"AIリスク・著作権・ガイドライン",time:"30分",hasDemo:false,done:false},
  {num:4,badge:"動画④",name:"議事録・要約・業界調査の実践",time:"40分",hasDemo:true, done:false},
  {num:5,badge:"動画⑤",name:"GEM設定の基本操作",          time:"30分",hasDemo:true, done:false},
  {num:6,badge:"動画⑥",name:"NotebookLMデモ紹介",         time:"20分",hasDemo:true, done:false},
  {num:7,badge:"動画⑦",name:"ビルドの基本操作（ミニアプリ入門）",time:"50分",hasDemo:true,done:false},
];

// ============================================================
// 状態
// ============================================================
let current = 4;
let currentVType = 0;
let simProg = 0;
let editMode = false;
const VT_LABELS = ["概要","具体的内容","実演"];
const NUMS = ["①","②","③","④","⑤","⑥","⑦"];

// 進捗をlocalStorageから復元
function loadProgress(){
  try{
    const s = localStorage.getItem('ai_el_v4_progress');
    if(s){
      const prog = JSON.parse(s);
      prog.forEach((d,i)=>{ if(lessons[i]) lessons[i].done = d; });
    }
  }catch(e){}
}

function saveProgress(){
  localStorage.setItem('ai_el_v4_progress', JSON.stringify(lessons.map(l=>l.done)));
  const b = document.querySelector('.save-all-btn');
  b.textContent='✅ 保存しました！';
  setTimeout(()=>b.textContent='💾 進捗を保存',2000);
}

function exportUrls(){
  // 現在のURLSをコンソールに出力（urls.js更新用）
  let out = '// urls.js - コピーして使用してください\nconst YOUTUBE_URLS = [\n';
  YOUTUBE_URLS.forEach((u,i)=>{
    out += `  ["${u[0]}", "${u[1]}", "${u[2]}"],  // 動画${NUMS[i]}\n`;
  });
  out += '];\n\nconst FINAL_TEST_URL = "'+FINAL_TEST_URL+'";';
  const blob = new Blob([out],{type:'text/javascript'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'urls.js';
  a.click();
}

function toggleEditMode(){
  editMode=!editMode;
  document.getElementById('editToggleBtn').textContent=editMode?'👁️ 閲覧モードに戻る':'✏️ 編集モード';
  document.getElementById('editToggleBtn').className='edit-toggle-btn'+(editMode?' on':'');
  document.getElementById('editBar').className='edit-bar'+(editMode?' show':'');
  document.getElementById('mainArea').className=editMode?'edit-mode-active':'';
}

// ============================================================
// サイドバー
// ============================================================
function renderSidebar(){
  document.getElementById('lessonList').innerHTML = lessons.map((l,i)=>`
    <div class="lesson-item${i===current?' active':''}" onclick="selectLesson(${i})">
      <div class="lcheck${l.done?' done':''}">${l.done?'✓':''}</div>
      <div class="linfo">
        <div class="lname">${l.name}</div>
        <div class="lmeta"><span class="ltime">${l.time}</span>${l.done?'<span class="done-tag">視聴済</span>':''}</div>
      </div>
      <div class="lnum">${l.badge}</div>
    </div>`).join('');
}

// ============================================================
// 動画セレクタ
// ============================================================
function selectVideoType(type){
  currentVType=type;
  [0,1,2].forEach(i=>document.getElementById('vsel'+i).className='vsel-btn'+(i===type?' active':''));
  document.getElementById('vTypeLabel').textContent=VT_LABELS[type];
  document.getElementById('urlEditLabel').textContent=`YouTube URL（${VT_LABELS[type]}）：`;
  document.getElementById('urlInput').value=YOUTUBE_URLS[current][type]||'';
  const exBtn=document.getElementById('exTabBtn');
  exBtn.style.display=(type===2 && lessons[current].hasDemo)?'block':'none';
  if(!(type===2 && lessons[current].hasDemo)) showTab('desc',document.querySelector('.tab-btn'));
  loadVideo();
}

function loadVideo(){
  const url=(YOUTUBE_URLS[current]||['','',''])[currentVType]||'';
  const iframe=document.getElementById('videoFrame'),ph=document.getElementById('vidPlaceholder');
  if(url){
    let v=url;
    if(v.includes('youtu.be/'))v=v.split('youtu.be/')[1].split('?')[0];
    else if(v.includes('v='))v=v.split('v=')[1].split('&')[0];
    iframe.src=`https://www.youtube.com/embed/${v}?rel=0`;
    iframe.style.display='block';ph.style.display='none';
  }else{
    iframe.style.display='none';iframe.src='';ph.style.display='flex';
    document.getElementById('phTitle').textContent=
      `${lessons[current].badge} ${lessons[current].name}\n【${VT_LABELS[currentVType]}】\nYouTube URLをurls.jsに設定すると再生できます`;
  }
}

function applyUrl(){
  // 編集モード時のURL一時適用（正式にはurls.jsを更新）
  YOUTUBE_URLS[current][currentVType]=document.getElementById('urlInput').value.trim();
  loadVideo();
}

// ============================================================
// 動画選択
// ============================================================
function selectLesson(i){
  current=i; currentVType=0; simProg=lessons[i].done?100:0;
  const l=lessons[i];
  document.getElementById('vBadge').textContent=l.badge;
  document.getElementById('vTitle').textContent=l.name;
  document.getElementById('vTime').textContent=l.time;
  document.getElementById('vTypeLabel').textContent=VT_LABELS[0];
  [0,1,2].forEach(j=>{
    document.getElementById('vsel'+j).className='vsel-btn'+(j===0?' active':'');
    document.getElementById('vsub'+j).textContent=`動画${NUMS[i]}-${j+1}`;
  });
  document.getElementById('exTabBtn').style.display='none';
  document.getElementById('finalBanner').className='final-banner'+(i===6?' show':'');
  document.getElementById('urlInput').value=YOUTUBE_URLS[i]?.[0]||'';
  document.getElementById('urlEditLabel').textContent='YouTube URL（概要）：';
  loadVideo(); updateProgress(); renderSidebar(); renderAll();
  showTab('desc',document.querySelector('.tab-btn'));
}

function updateProgress(){
  const l=lessons[current],total=parseInt(l.time),cur=Math.round(simProg/100*total);
  document.getElementById('videoProgress').style.width=simProg+'%';
  document.getElementById('vcTime').textContent=`${cur}:00 / ${total}:00`;
  const done=lessons.filter(x=>x.done).length;
  document.getElementById('progText').textContent=`${done} / 7 完了`;
  document.getElementById('globalBar').style.width=(done/7*100)+'%';
}

function seekProg(e){
  const r=e.currentTarget.getBoundingClientRect();
  simProg=Math.max(0,Math.min(100,Math.round((e.clientX-r.left)/r.width*100)));
  updateProgress();
}
function markDone(){lessons[current].done=true;simProg=100;updateProgress();renderSidebar();saveProgress();}
function nextLesson(){if(current<lessons.length-1)selectLesson(current+1);}
function openFinalTest(){
  if(FINAL_TEST_URL.includes('XXXXXXXXX')){alert('GoogleフォームのURLをurls.jsのFINAL_TEST_URLに設定してください。');return;}
  window.open(FINAL_TEST_URL,'_blank');
}

// ============================================================
// コンテンツ描画（content.jsのデータを使用）
// ============================================================
function renderAll(){renderDesc();renderPrompts();renderExercises();}

function renderDesc(){
  const c=CONTENT[current];
  document.getElementById('descPanel').innerHTML=`
    <div class="desc-intro">${esc(c.desc)}</div>
    <div class="point-grid">${c.points.map(p=>`<span class="point-chip">✓ ${esc(p)}</span>`).join('')}</div>`;
}

function renderPrompts(){
  const c=CONTENT[current],panel=document.getElementById('promptPanel');
  if(!c.prompts||c.prompts.length===0){
    panel.innerHTML='<div class="no-prompt-msg">この動画のプロンプトは準備中です。</div>';return;
  }
  panel.innerHTML=c.prompts.map((p,pi)=>`
    <div class="prompt-box">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;">
        <div class="prompt-label">${esc(p.label)}</div>
        <button class="copy-btn" onclick="copyP(${pi})">コピー</button>
      </div>
      <div class="prompt-text">${esc(p.text)}</div>
    </div>`).join('');
}

function renderExercises(){
  const c=CONTENT[current],exs=c.exercises||[],panel=document.getElementById('exercisePanel');
  if(exs.length===0){panel.innerHTML='<div class="no-prompt-msg">この動画の練習問題は準備中です。</div>';return;}
  panel.innerHTML=`<div class="ex-title">実演練習問題 — Geminiで実際に操作してみましょう</div>`+
    exs.map((ex,ei)=>`<div class="ex-item">
      <div class="ex-num">問題 ${ei+1}</div>
      <div class="ex-q">${esc(ex.q)}</div>
      <div class="ex-hint"><span class="ex-hint-label">💡 ヒント</span>${esc(ex.hint)}</div>
    </div>`).join('');
}

function copyP(i){
  navigator.clipboard.writeText(CONTENT[current].prompts[i].text).then(()=>{
    const b=document.querySelectorAll('.copy-btn');
    if(b[i]){b[i].textContent='コピー済！';setTimeout(()=>b[i].textContent='コピー',1500);}
  });
}

function showTab(tab,btn){
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  if(btn)btn.classList.add('active');
  ['desc','prompt','exercise'].forEach(t=>
    document.getElementById(t+'Panel').style.display=t===tab?'block':'none');
}

function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

// 起動
loadProgress();
selectLesson(4);
</script>
</body>
</html>
